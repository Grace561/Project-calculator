<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="calculator">

    <div class="display">
        <span id="display">0</span>
    </div>

    <div class="buttons">

        <button class="clear">C</button>
        <button class="delete">⌫</button>
        <button class="operator">÷</button>

        <button>7</button>
        <button>8</button>
        <button>9</button>
        <button class="operator">+</button>

        <button>4</button>
        <button>5</button>
        <button>6</button>
        <button class="operator">-</button>

        <button>1</button>
        <button>2</button>
        <button>3</button>
        <button class="operator">×</button>

        <button>0</button>
        <button>.</button>
        <button class="equal">=</button>

    </div>

    <p class="footer">Powered by © 2026 AyomideBlessing</p>

</div>


<script src="script.js"></script>

</body>
</html>
